apiVersion: apps/v1
kind: ReplicaSet
metadata: 
  name: my-rs 
  labels:
    app: myapp 
spec:
  replicas: 5
  selector:
    matchLabels:
      app: myapp 
  template:
    metadata:
      name: my-rs-template 
      labels:
        app: myapp 
    spec:
      containers:
        - name: app-container
          image: mayurpandit25/react-app:latest
          ports:
            - name: app-port 
              containerPort: 80

...
---

apiVersion: v1
kind: Service 
metadata: 
  name: rs-svc 
  labels:
    app: myapp 
spec:
  type: NodePort 
  selector:
    app: myapp 
  ports:
    - name: svc-port
      protocol: TCP 
      port: 80
      targetPort: 80


