apiversion: autoscaling/v1 
kind: HorizontalPortScaler
metadata:
  name: hpa 
  labels:
    app: myapp
  namespace: hpa
spec:
  scaleTargetRef:
    apiversion: app/v1
    kind: Deployment
    name: my-deployment
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 40
